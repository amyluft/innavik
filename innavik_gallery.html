<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Innavik in Photos</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a1220;
    color: #e8e4dc;
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
  }

  .gallery-header {
    text-align: center;
    padding: 48px 24px 32px;
    border-bottom: 1px solid rgba(107,184,212,0.2);
  }
  .gallery-header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(28px, 5vw, 48px);
    font-weight: 400;
    color: #fff;
    letter-spacing: 0.02em;
  }
  .gallery-header p {
    font-size: 13px;
    color: #6bb8d4;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 8px;
  }

  /* LIGHTBOX */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 1000;
    background: rgba(5,10,20,0.97);
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .lightbox.active { display: flex; }

  .lb-close {
    position: absolute;
    top: 16px; right: 20px;
    background: none; border: none;
    color: #fff; font-size: 32px;
    cursor: pointer; line-height: 1;
    opacity: 0.7;
    z-index: 10;
  }
  .lb-close:hover { opacity: 1; }

  .lb-counter {
    position: absolute;
    top: 20px; left: 20px;
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.1em;
    font-family: 'IBM Plex Sans', sans-serif;
  }

  .lb-img-wrap {
    position: relative;
    width: 100%;
    max-width: 900px;
    max-height: 65vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 60px;
  }
  .lb-img-wrap img {
    max-width: 100%;
    max-height: 65vh;
    object-fit: contain;
    display: block;
  }

  .lb-btn {
    position: absolute;
    top: 50%; transform: translateY(-50%);
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: #fff;
    width: 44px; height: 44px;
    border-radius: 50%;
    font-size: 20px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
    z-index: 5;
  }
  .lb-btn:hover { background: rgba(107,184,212,0.25); }
  .lb-prev { left: 8px; }
  .lb-next { right: 8px; }

  .lb-caption {
    max-width: 820px;
    padding: 20px 24px 0;
    text-align: center;
  }
  .lb-caption h3 {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 600;
    color: #6bb8d4;
    margin-bottom: 8px;
  }
  .lb-caption p {
    font-size: 13px;
    line-height: 1.65;
    color: rgba(232,228,220,0.8);
  }
  .lb-credit {
    font-size: 11px;
    color: rgba(255,255,255,0.35);
    margin-top: 10px;
    letter-spacing: 0.05em;
  }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 3px;
    padding: 3px;
  }

  .grid-item {
    position: relative;
    aspect-ratio: 4/3;
    overflow: hidden;
    cursor: pointer;
    background: #111a2a;
  }
  .grid-item img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.4s ease;
  }
  .grid-item:hover img { transform: scale(1.04); }

  .grid-item-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(5,10,20,0.85) 0%, transparent 50%);
    opacity: 0;
    transition: opacity 0.3s;
    display: flex;
    align-items: flex-end;
    padding: 16px;
  }
  .grid-item:hover .grid-item-overlay { opacity: 1; }
  .grid-item-overlay span {
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    color: #fff;
    line-height: 1.3;
  }

  @media (max-width: 600px) {
    .grid { grid-template-columns: repeat(2, 1fr); gap: 2px; padding: 2px; }
    .lb-img-wrap { padding: 0 48px; }
    .lb-caption h3 { font-size: 14px; }
    .lb-caption p { font-size: 12px; }
  }
</style>
</head>
<body>

<div class="gallery-header">
  <h1>Innavik in Photos</h1>
  <p>Inukjuak, Nunavik &middot; Photos by Lina Forero / Concordia University</p>
</div>

<div class="grid" id="grid"></div>

<div class="lightbox" id="lightbox">
  <div class="lb-counter" id="lb-counter"></div>
  <button class="lb-close" id="lb-close">&#x2715;</button>
  <div class="lb-img-wrap">
    <button class="lb-btn lb-prev" id="lb-prev">&#8592;</button>
    <img id="lb-img" src="" alt="">
    <button class="lb-btn lb-next" id="lb-next">&#8594;</button>
  </div>
  <div class="lb-caption">
    <h3 id="lb-title"></h3>
    <p id="lb-caption"></p>
    <p class="lb-credit">Photo by Lina Forero / Concordia University and Indigenous Clean Energy</p>
  </div>
</div>

<script>
const photos = [
  { src: "https://www.ctvnews.ca/resizer/v2/W72JSFWVHZHMJNM3TA7GMJPQUM.png?auth=2dd116aa898c1b28fbaf9cd1bfa588dc49d4b688107a7dfb4f110215bfba6169&width=1200", title: "Sarah Lisa Kasudluak", caption: "Sarah Lisa Kasudluak, vice president of Pituvik Landholding Corporation, beams as she looks out over the land in her home community of Inukjuak in Arctic Quebec. Through the efforts of Kasudluak and her colleagues, the town has replaced diesel fuel with clean hydroelectric power." },
  { src: "https://www.ctvnews.ca/resizer/v2/UCLZXUSPZNCCJJOP7XND4GRV2Q.png?auth=a26664222aa6f7ae0836514cf4a55f43ed2df9d6d35803a3d32e6abab6642424&width=1200", title: "Josie Nastapoka", caption: "Josie Nastapoka, a hunter and member of the Unaaq Men's Association of Inukjuak, shudders as he recalls an ill-fated hunting trip when he and two friends crashed through thin ice on their snowmobiles. According to the World Wildlife Foundation, the Arctic is warming faster than any other region on Earth, at a rate of three times the global average." },
  { src: "https://www.ctvnews.ca/resizer/v2/SY7TBAUTZRGGPJ2R4EMJYQCG7U.png?auth=f8075250b09312e19f4b960b76daeb7016a2ca4e7093a4092d629f1913fc20e7&width=1200", title: "Eric Atagotaaluk", caption: "Eric Atagotaaluk reflects as he walks on the land outside his cabin near the Arctic village of Inukjuak in northern Quebec. As project director of Pituvik Sarvaq Energie, he says there were times over the years when it was unclear if the Innavik project would move forward. Now completed and operational as of winter 2024, Innavik has become a source of pride for the community." },
  { src: "https://www.ctvnews.ca/resizer/v2/S6AEIVA7GJE6RHXQPFZGLY2G7Q.png?auth=978c2427619bf14d529fd36c5cdf0f2b5189548c0de0d6c01d331fb683fadb1c&width=1200", title: "Tommy Palliser", caption: "President of the Pituvik Landholding Corporation, Tommy Palliser says the Inuit-owned Innavik will sell extra power to Hydro-Québec for a projected profit of approximately one million dollars per year. Palliser says the money will be used for training programs and community infrastructure projects chosen by the people of Inukjuak." },
  { src: "https://www.ctvnews.ca/resizer/v2/RRPP7COLMZCR7CN43B267BONXA.png?auth=3025c2c55466f3333a1bd77fdc8604a851e059f2ec07a0ffa76be088d9f347bf&width=1200", title: "Charlie Elijassiapik", caption: "Charlie Elijassiapik, a hunter and member of the Unaaq Men's Association in Inukjuak, builds a miniature sled at the association's wood workshop. Unaaq creates opportunities for elders to share traditional hunting skills and tool-making knowledge with youth in Inukjuak." },
  { src: "https://www.ctvnews.ca/resizer/v2/D6QAIR6RKRETHNIHZ5LBFDTJPQ.png?auth=af009161068beabb0d130f909acbb208db8186aa2b51587450eb65fb7b8afa7a&width=1200", title: "A canoe rests on the shores of the Innuksuak River", caption: "A canoe rests on the shores of the Innuksuak River in Inukjuak, where the river meets Hudson Bay. This community of nearly 2,000 people is transitioning to clean energy, with about 90 per cent of homes already switched to electric heating through the Innavik Hydro project." },
  { src: "https://www.ctvnews.ca/resizer/v2/CH335LJHN5FVJK4AZMEUXH3MPA.jpg?auth=b036d83b738a0b562dc2f0052203f62998570e53c552fa841913d622f04fa46c&width=1200", title: "Danger sign", caption: "A danger sign marks the entrance of the Innavik Hydro facility in Inukjuak, Quebec, on a crisp and windy day in October 2024." },
  { src: "https://www.ctvnews.ca/resizer/v2/3AK7KUWXRBGXRPQ3N7TLITE6EY.jpg?auth=7900f525ed2c03ad10e04fad3de13b399e696e454b6c546a9a15a9aa953e37df&width=1200", title: "Innavik Hydro facility", caption: "The Innavik Hydro facility in Inukjuak. The community sells excess power to Hydro-Québec under a 40-year agreement, bringing in roughly $90 million that will go toward local projects." },
  { src: "https://www.ctvnews.ca/resizer/v2/U3QDBY4XYFE3ZAQEM6TTA6RFBQ.jpg?auth=cd87c82d0022c66093abd53a1576c462d9242a13a538b642be97b1cafd728017&width=1200", title: "Innavik Hydro facility on the Innuksuak River", caption: "The Innavik Hydro facility on the Innuksuak River, October 2024. This 7.5-megawatt, Inuit-owned facility is the largest off-grid hydropower project in Canada." },
  { src: "https://www.ctvnews.ca/resizer/v2/S3BF2DIU7FH7LKELR7SARLGWLU.jpg?auth=6b81b427737b8f2d733775a1cea155c105d3b26757f7c1df1bdb3db465779dfb&width=1200", title: "Woman in amauti", caption: "A woman carries her baby in an amauti outside the Northern Store in Inukjuak, October 2024. The traditional Inuit parka features a built-in pouch below the hood that can hold babies until about age two." },
  { src: "https://www.ctvnews.ca/resizer/v2/LTJYUE4UMRBCLGWDVC4R7IKBMI.jpg?auth=ab7808a61712c0e506a11d4c27c70ca676892ce6a1008a5b168d7bfd8e5e07af&width=1200", title: "Community feast", caption: "An Inuk woman carries her baby at a community feast in Inukjuak, October 2024. The gathering at Pinguavik Recreation Centre features traditional country foods including caribou and whale." },
  { src: "https://www.ctvnews.ca/resizer/v2/GVVWAJW6ZFG3JJZX5ZHNMJURPE.jpg?auth=7bc12d70235ffe62742989fcd3d4c734ca3e7854c6d914dca4416f6d3ad3c59d&width=1200", title: "Homes and power lines", caption: "Homes and power lines in Inukjuak, northern Quebec, October 2024. The Inuit community has successfully replaced diesel power with clean hydroelectricity in most homes and buildings." },
  { src: "https://www.ctvnews.ca/resizer/v2/W2EIR4GBLVDMJJX37UARC2VFPQ.jpg?auth=e84358e018cf258a57a5de880e7c78efc461ad5f928c8d15020f4aff0470c102&width=1200", title: "Old diesel power plant", caption: "The old diesel power plant in Inukjuak, shut down since Innavik Hydro became operational. This facility once burned nearly three million litres of fuel each year." },
  { src: "https://www.ctvnews.ca/resizer/v2/3LLI626YIJF35JCQ5QZDIHVHAU.png?auth=602ae522d58edcc35136ca2c531486311a823d79924bd3e06e891009ee7040f6&width=1200", title: "Rusting diesel tanks", caption: "Rusting diesel tanks in Inukjuak mark the end of an era. Before the community transitioned to clean hydropower, these storage tanks held millions of litres of diesel fuel needed to heat homes and generate electricity." },
  { src: "https://www.ctvnews.ca/resizer/v2/VKPOUY7A5BDXFNGGBKD3XRBFZU.png?auth=39bdfc09b90038496ec2f2074a71bf9662e54e4f2d9a0dd421b9cfc034057bf7&width=1200", title: "Aleashia Echalook", caption: "Aleashia Echalook, mother of three and the youngest board member of the Pituvik Landholding Corporation, carries her three-month-old baby, Dolly, in her amauti as she walks through Inukjuak." },
  { src: "https://www.ctvnews.ca/resizer/v2/4YYXJRN3KBGOLLHIUZU3IUEEEM.png?auth=d99be91e91787360c75689b5e2d97d5edbf99935c9846e46b4bffcee9f65a881&width=1200", title: "Aleashia Echalook and baby Dolly", caption: "With her baby Dolly snug in her amauti, Aleashia Echalook stands outside her home looking toward the Innuksuak river. As the youngest board member of Pituvik Landholding Corporation, the mother of three is hopeful about what the new hydro project will bring for the next generation." },
  { src: "https://www.ctvnews.ca/resizer/v2/JBPSUZHICJFWZHCP4U7FI3FVTM.jpg?auth=70e8993ffb5fbb0004cfe38cf75268eb1dd4ece4f4854f8a36c31c7504537947&width=1200", title: "ARENA participants", caption: "Arctic Remote Energy Networks Academy (ARENA) participants tour the Innavik Hydro site in Inukjuak, October 2024." },
];

let current = 0;
const grid = document.getElementById('grid');
const lightbox = document.getElementById('lightbox');
const lbImg = document.getElementById('lb-img');
const lbTitle = document.getElementById('lb-title');
const lbCaption = document.getElementById('lb-caption');
const lbCounter = document.getElementById('lb-counter');

photos.forEach((p, i) => {
  const item = document.createElement('div');
  item.className = 'grid-item';
  item.innerHTML = `
    <img src="${p.src}" alt="${p.title}" loading="lazy">
    <div class="grid-item-overlay"><span>${p.title}</span></div>
  `;
  item.addEventListener('click', () => open(i));
  grid.appendChild(item);
});

function open(i) {
  current = i;
  update();
  lightbox.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function close() {
  lightbox.classList.remove('active');
  document.body.style.overflow = '';
}

function update() {
  const p = photos[current];
  lbImg.src = p.src;
  lbTitle.textContent = p.title;
  lbCaption.textContent = p.caption;
  lbCounter.textContent = (current + 1) + ' / ' + photos.length;
}

document.getElementById('lb-close').addEventListener('click', close);
document.getElementById('lb-prev').addEventListener('click', () => { current = (current - 1 + photos.length) % photos.length; update(); });
document.getElementById('lb-next').addEventListener('click', () => { current = (current + 1) % photos.length; update(); });

lightbox.addEventListener('click', e => { if (e.target === lightbox) close(); });

document.addEventListener('keydown', e => {
  if (!lightbox.classList.contains('active')) return;
  if (e.key === 'ArrowLeft') { current = (current - 1 + photos.length) % photos.length; update(); }
  if (e.key === 'ArrowRight') { current = (current + 1) % photos.length; update(); }
  if (e.key === 'Escape') close();
});
</script>
</body>
</html>
