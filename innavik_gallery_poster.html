<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Innavik Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #0a1628; }

  .poster {
    position: relative;
    width: 100%;
    height: 600px;
    overflow: hidden;
    cursor: pointer;
  }
  .poster img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 60%;
    display: block;
  }
  .poster-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
  }
  .bottom-strip {
    width: 100%;
    background: rgba(10,22,40,0.82);
    padding: 18px 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 6px;
  }
  .eyebrow {
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #6bb8d4;
  }
  .title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(24px, 4vw, 36px);
    font-weight: 400;
    color: #fff;
    line-height: 1.1;
  }
  .subtitle {
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px;
    font-weight: 300;
    color: rgba(255,255,255,0.85);
    line-height: 1.6;
  }
  .play-btn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: rgba(107,184,212,0.25);
    border: 2px solid rgba(107,184,212,0.8);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, transform 0.2s;
  }
  .poster:hover .play-btn {
    background: rgba(107,184,212,0.45);
    transform: translate(-50%, -50%) scale(1.08);
  }
  .play-btn svg {
    width: 26px; height: 26px;
    fill: #fff;
    margin-left: 4px;
  }
  .credit {
    position: absolute;
    bottom: 10px; right: 14px;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 10px;
    color: rgba(255,255,255,0.4);
  }
  .gallery-frame {
    display: none;
    width: 100%;
    height: 600px;
    border: none;
  }
</style>
</head>
<body>

<div class="poster" id="poster" onclick="loadGallery()">
  <img src="https://www.ctvnews.ca/resizer/v2/D6QAIR6RKRETHNIHZ5LBFDTJPQ.png?auth=af009161068beabb0d130f909acbb208db8186aa2b51587450eb65fb7b8afa7a&width=1200" alt="Canoe on the shores of the Innuksuak River">
  <div class="poster-overlay">
    <div class="bottom-strip">
      <div class="eyebrow">Innavik in Photos</div>
      <div class="title">See the community</div>
      <div class="subtitle">See the community and the Innavik project in a series of photos taken by Lina Forero as part of her Concordia MA thesis.</div>
    </div>
    <div class="play-btn">
      <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    </div>
  </div>
  </div>
  <div class="credit">Photo: Lina Forero / Concordia University</div>
</div>

<iframe id="gallery" class="gallery-frame" src="" scrolling="no" tabindex="-1"></iframe>

<script>
function loadGallery() {
  document.getElementById('poster').style.display = 'none';
  var f = document.getElementById('gallery');
  f.src = 'https://amyluft.github.io/innavik/innavik_gallery.html';
  f.style.display = 'block';
}
</script>
</body>
</html>
