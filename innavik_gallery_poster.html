<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Innavik Gallery Loader</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #0a1628; }

  .poster {
    position: relative;
    width: 100%;
    height: 600px;
    cursor: pointer;
    overflow: hidden;
  }

  .poster img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 60%;
    display: block;
    transition: transform 0.4s ease;
  }
  .poster:hover img { transform: scale(1.02); }

  .poster-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(10,22,40,0.2) 0%,
      rgba(10,22,40,0.6) 100%
    );
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }

  .poster-text {
    text-align: center;
  }
  .poster-eyebrow {
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #6bb8d4;
    margin-bottom: 10px;
  }
  .poster-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(22px, 4vw, 36px);
    font-weight: 400;
    color: #fff;
    text-shadow: 0 2px 12px rgba(0,0,0,0.6);
    margin-bottom: 6px;
  }
  .poster-sub {
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px;
    color: rgba(232,228,220,0.8);
    font-weight: 300;
  }

  .play-btn {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: rgba(107,184,212,0.2);
    border: 2px solid rgba(107,184,212,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, transform 0.2s;
  }
  .poster:hover .play-btn {
    background: rgba(107,184,212,0.35);
    transform: scale(1.08);
  }
  .play-btn svg {
    width: 24px;
    height: 24px;
    fill: #fff;
    margin-left: 4px;
  }

  .poster-credit {
    position: absolute;
    bottom: 12px;
    right: 16px;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 10px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.04em;
  }

  .gallery-frame {
    display: none;
    width: 100%;
    height: 600px;
    border: none;
  }
</style>
</head>
<body>

<div class="poster" id="poster" onclick="loadGallery()">
  <img src="https://www.ctvnews.ca/resizer/v2/D6QAIR6RKRETHNIHZ5LBFDTJPQ.png?auth=af009161068beabb0d130f909acbb208db8186aa2b51587450eb65fb7b8afa7a&width=1200" alt="A canoe on the shores of the Innuksuak River">
  <div class="poster-overlay">
    <div class="poster-text">
      <div class="poster-eyebrow">Innavik in Photos</div>
      <div class="poster-title">See the community</div>
      <div class="poster-sub">17 photos from Inukjuak, Nunavik</div>
    </div>
    <div class="play-btn">
      <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    </div>
  </div>
  <div class="poster-credit">Photo: Lina Forero / Concordia University</div>
</div>

<iframe 
  id="gallery" 
  class="gallery-frame"
  src=""
  scrolling="no"
  tabindex="-1"
  allow="autoplay">
</iframe>

<script>
function loadGallery() {
  document.getElementById('poster').style.display = 'none';
  const frame = document.getElementById('gallery');
  frame.src = 'https://amyluft.github.io/innavik/innavik_gallery.html';
  frame.style.display = 'block';
}
</script>

</body>
</html>
