<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Innavik in Photos</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; background: #0a1628; overflow: hidden; }

  .gallery {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    overflow: hidden;
  }

  /* IMAGE SIDE — 75% */
  .img-side {
    position: relative;
    flex: 0 0 75%;
    background: #0a1628;
    overflow: hidden;
  }

  .slide {
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.6s ease;
  }
  .slide.active { opacity: 1; }

  .slide img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    object-position: center;
    display: block;
  }

  /* counter top left */
  .counter {
    position: absolute;
    top: 16px; left: 20px;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.1em;
    z-index: 10;
  }

  /* nav arrows */
  .nav-btn {
    position: absolute;
    top: 50%; transform: translateY(-50%);
    z-index: 10;
    background: rgba(6,13,24,0.5);
    border: 1px solid rgba(107,184,212,0.25);
    color: #fff;
    width: 44px; height: 44px;
    border-radius: 50%;
    font-size: 20px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  .nav-btn:hover { background: rgba(107,184,212,0.2); }
  .nav-prev { left: 12px; }
  .nav-next { right: 12px; }

  /* CAPTION SIDE — 25% */
  .caption-side {
    flex: 0 0 25%;
    background: #0a1628;
    border-left: 1px solid rgba(107,184,212,0.15);
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 32px 28px;
    overflow: hidden;
  }

  .caption-eyebrow {
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #6bb8d4;
    margin-bottom: 14px;
  }

  .caption-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(15px, 1.8vw, 20px);
    font-weight: 600;
    color: #fff;
    line-height: 1.3;
    margin-bottom: 14px;
  }

  .caption-text {
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: clamp(11px, 1vw, 13px);
    line-height: 1.7;
    color: rgba(232,228,220,0.75);
  }

  .caption-credit {
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 10px;
    color: rgba(255,255,255,0.3);
    margin-top: 20px;
    letter-spacing: 0.04em;
  }

  /* thumb strip at bottom of caption side */
  .thumb-strip {
    display: flex;
    flex-wrap: wrap;
    gap: 3px;
    margin-top: 24px;
  }
  .thumb {
    width: 28px; height: 22px;
    overflow: hidden;
    cursor: pointer;
    opacity: 0.4;
    transition: opacity 0.2s;
    border: 1px solid transparent;
  }
  .thumb.active { opacity: 1; border-color: #6bb8d4; }
  .thumb:hover { opacity: 0.8; }
  .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }

  @media (max-width: 700px) {
    .gallery { flex-direction: column; }
    .img-side { flex: 0 0 60%; }
    .caption-side { flex: 1; border-left: none; border-top: 1px solid rgba(107,184,212,0.15); padding: 20px; }
    .nav-btn { width: 36px; height: 36px; font-size: 16px; }
  }
</style>
</head>
<body>
<div class="gallery">

  <div class="img-side" id="img-side">
    <div class="counter" id="counter">1 / 17</div>
    <button class="nav-btn nav-prev" id="prev">&#8592;</button>
    <button class="nav-btn nav-next" id="next">&#8594;</button>
    <div id="slides"></div>
  </div>

  <div class="caption-side">
    <div class="caption-eyebrow">Inukjuak, Nunavik &middot; Oct. 2024</div>
    <div class="caption-title" id="cap-title"></div>
    <div class="caption-text" id="cap-text"></div>
    <div class="caption-credit">Photo by Lina Forero / Concordia University and Indigenous Clean Energy</div>
    <div class="thumb-strip" id="thumbs"></div>
  </div>

</div>

<script>
const photos = [
  { src: "https://www.ctvnews.ca/resizer/v2/W72JSFWVHZHMJNM3TA7GMJPQUM.png?auth=2dd116aa898c1b28fbaf9cd1bfa588dc49d4b688107a7dfb4f110215bfba6169&width=1200", title: "Sarah Lisa Kasudluak", caption: "Vice president of Pituvik Landholding Corporation, beams as she looks out over the land in her home community of Inukjuak in Arctic Quebec. Through the efforts of Kasudluak and her colleagues, the town has replaced diesel fuel with clean hydroelectric power." },
  { src: "https://www.ctvnews.ca/resizer/v2/UCLZXUSPZNCCJJOP7XND4GRV2Q.png?auth=a26664222aa6f7ae0836514cf4a55f43ed2df9d6d35803a3d32e6abab6642424&width=1200", title: "Josie Nastapoka", caption: "A hunter and member of the Unaaq Men's Association of Inukjuak, shudders as he recalls an ill-fated hunting trip when he and two friends crashed through thin ice. The Arctic is warming at three times the global average." },
  { src: "https://www.ctvnews.ca/resizer/v2/SY7TBAUTZRGGPJ2R4EMJYQCG7U.png?auth=f8075250b09312e19f4b960b76daeb7016a2ca4e7093a4092d629f1913fc20e7&width=1200", title: "Eric Atagotaaluk", caption: "Project director of Pituvik Sarvaq Energie, reflects as he walks on the land outside his cabin near Inukjuak. Now completed and operational as of winter 2024, Innavik has become a source of pride for the community." },
  { src: "https://www.ctvnews.ca/resizer/v2/S6AEIVA7GJE6RHXQPFZGLY2G7Q.png?auth=978c2427619bf14d529fd36c5cdf0f2b5189548c0de0d6c01d331fb683fadb1c&width=1200", title: "Tommy Palliser", caption: "President of the Pituvik Landholding Corporation says the Inuit-owned Innavik will sell extra power to Hydro-Québec for a projected profit of approximately one million dollars per year." },
  { src: "https://www.ctvnews.ca/resizer/v2/RRPP7COLMZCR7CN43B267BONXA.png?auth=3025c2c55466f3333a1bd77fdc8604a851e059f2ec07a0ffa76be088d9f347bf&width=1200", title: "Charlie Elijassiapik", caption: "A hunter and member of the Unaaq Men's Association, builds a miniature sled at the association's wood workshop. Unaaq creates opportunities for elders to share traditional hunting skills with youth." },
  { src: "https://www.ctvnews.ca/resizer/v2/D6QAIR6RKRETHNIHZ5LBFDTJPQ.png?auth=af009161068beabb0d130f909acbb208db8186aa2b51587450eb65fb7b8afa7a&width=1200", title: "Shores of the Innuksuak River", caption: "A canoe rests on the shores of the Innuksuak River in Inukjuak, where the river meets Hudson Bay. This community of nearly 2,000 people aims to reach net zero by 2030." },
  { src: "https://www.ctvnews.ca/resizer/v2/CH335LJHN5FVJK4AZMEUXH3MPA.jpg?auth=b036d83b738a0b562dc2f0052203f62998570e53c552fa841913d622f04fa46c&width=1200", title: "Danger sign", caption: "A danger sign marks the entrance of the Innavik Hydro facility in Inukjuak, Quebec, on a crisp and windy day in October 2024." },
  { src: "https://www.ctvnews.ca/resizer/v2/3AK7KUWXRBGXRPQ3N7TLITE6EY.jpg?auth=7900f525ed2c03ad10e04fad3de13b399e696e454b6c546a9a15a9aa953e37df&width=1200", title: "Innavik Hydro facility", caption: "The community sells excess power to Hydro-Québec under a 40-year agreement, bringing in roughly $90 million that will go toward local projects." },
  { src: "https://www.ctvnews.ca/resizer/v2/U3QDBY4XYFE3ZAQEM6TTA6RFBQ.jpg?auth=cd87c82d0022c66093abd53a1576c462d9242a13a538b642be97b1cafd728017&width=1200", title: "Innavik Hydro on the Innuksuak River", caption: "This 7.5-megawatt, Inuit-owned facility is the largest off-grid hydropower project in Canada, photographed in October 2024." },
  { src: "https://www.ctvnews.ca/resizer/v2/S3BF2DIU7FH7LKELR7SARLGWLU.jpg?auth=6b81b427737b8f2d733775a1cea155c105d3b26757f7c1df1bdb3db465779dfb&width=1200", title: "Woman in amauti", caption: "A woman carries her baby in an amauti outside the Northern Store in Inukjuak, October 2024. The traditional Inuit parka features a built-in pouch that can hold babies until about age two." },
  { src: "https://www.ctvnews.ca/resizer/v2/LTJYUE4UMRBCLGWDVC4R7IKBMI.jpg?auth=ab7808a61712c0e506a11d4c27c70ca676892ce6a1008a5b168d7bfd8e5e07af&width=1200", title: "Community feast", caption: "An Inuk woman carries her baby at a community feast at Pinguavik Recreation Centre featuring traditional country foods including caribou and whale, October 2024." },
  { src: "https://www.ctvnews.ca/resizer/v2/GVVWAJW6ZFG3JJZX5ZHNMJURPE.jpg?auth=7bc12d70235ffe62742989fcd3d4c734ca3e7854c6d914dca4416f6d3ad3c59d&width=1200", title: "Homes and power lines", caption: "The Inuit community has successfully replaced diesel power with clean hydroelectricity in most homes and buildings through the community-led Innavik Hydro project." },
  { src: "https://www.ctvnews.ca/resizer/v2/W2EIR4GBLVDMJJX37UARC2VFPQ.jpg?auth=e84358e018cf258a57a5de880e7c78efc461ad5f928c8d15020f4aff0470c102&width=1200", title: "Old diesel power plant", caption: "The old diesel power plant in Inukjuak, shut down since Innavik Hydro became operational. This facility once burned nearly three million litres of fuel each year." },
  { src: "https://www.ctvnews.ca/resizer/v2/3LLI626YIJF35JCQ5QZDIHVHAU.png?auth=602ae522d58edcc35136ca2c531486311a823d79924bd3e06e891009ee7040f6&width=1200", title: "Rusting diesel tanks", caption: "Rusting diesel tanks in Inukjuak mark the end of an era. These storage tanks once held millions of litres of diesel fuel needed to heat homes and generate electricity." },
  { src: "https://www.ctvnews.ca/resizer/v2/VKPOUY7A5BDXFNGGBKD3XRBFZU.png?auth=39bdfc09b90038496ec2f2074a71bf9662e54e4f2d9a0dd421b9cfc034057bf7&width=1200", title: "Aleashia Echalook", caption: "Mother of three and youngest board member of Pituvik Landholding Corporation, carries her three-month-old baby Dolly in her amauti as she walks through Inukjuak." },
  { src: "https://www.ctvnews.ca/resizer/v2/4YYXJRN3KBGOLLHIUZU3IUEEEM.png?auth=d99be91e91787360c75689b5e2d97d5edbf99935c9846e46b4bffcee9f65a881&width=1200", title: "Aleashia Echalook and baby Dolly", caption: "With her baby Dolly snug in her amauti, Aleashia Echalook stands outside her home looking toward the Innuksuak river, hopeful about what the new hydro project will bring for the next generation." },
  { src: "https://www.ctvnews.ca/resizer/v2/JBPSUZHICJFWZHCP4U7FI3FVTM.jpg?auth=70e8993ffb5fbb0004cfe38cf75268eb1dd4ece4f4854f8a36c31c7504537947&width=1200", title: "ARENA participants", caption: "Arctic Remote Energy Networks Academy (ARENA) participants tour the Innavik Hydro site in Inukjuak, October 2024." },
];
let current = 0;
let autoTimer = null;

const slidesEl = document.getElementById('slides');
const thumbsEl = document.getElementById('thumbs');
const counterEl = document.getElementById('counter');
const capTitle = document.getElementById('cap-title');
const capText = document.getElementById('cap-text');

photos.forEach((p, i) => {
  const slide = document.createElement('div');
  slide.className = 'slide' + (i === 0 ? ' active' : '');
  const img = document.createElement('img');
  img.src = i === 0 ? p.src : '';
  img.dataset.src = p.src;
  img.alt = p.title;
  slide.appendChild(img);
  slidesEl.appendChild(slide);

  const thumb = document.createElement('div');
  thumb.className = 'thumb' + (i === 0 ? ' active' : '');
  thumb.innerHTML = `<img src="${p.src}" alt="">`;
  thumb.addEventListener('click', () => go(i));
  thumbsEl.appendChild(thumb);
});

const slides = document.querySelectorAll('.slide');
const thumbs = document.querySelectorAll('.thumb');

function preload(i) {
  const img = slides[i].querySelector('img');
  if (!img.src || img.src === window.location.href) img.src = img.dataset.src;
}

function go(i) {
  slides[current].classList.remove('active');
  thumbs[current].classList.remove('active');
  current = (i + photos.length) % photos.length;
  slides[current].classList.add('active');
  thumbs[current].classList.add('active');
  capTitle.textContent = photos[current].title;
  capText.textContent = photos[current].caption;
  counterEl.textContent = (current + 1) + ' / ' + photos.length;
  preload((current + 1) % photos.length);
  preload((current - 1 + photos.length) % photos.length);
  thumbs[current].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  resetAuto();
}

function resetAuto() {
  clearInterval(autoTimer);
  autoTimer = setInterval(() => go(current + 1), 6000);
}

document.getElementById('prev').addEventListener('click', () => go(current - 1));
document.getElementById('next').addEventListener('click', () => go(current + 1));
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') go(current - 1);
  if (e.key === 'ArrowRight') go(current + 1);
});

let tx = null;
document.addEventListener('touchstart', e => { tx = e.touches[0].clientX; });
document.addEventListener('touchend', e => {
  if (tx === null) return;
  const dx = e.changedTouches[0].clientX - tx;
  if (Math.abs(dx) > 40) go(current + (dx < 0 ? 1 : -1));
  tx = null;
});

go(0);
resetAuto();
</script>
</body>
</html>
